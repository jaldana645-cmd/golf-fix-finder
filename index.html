<!DOCTYPE html>
<html>
<head>
  <title>Golf Swing Fix Finder</title>

  <!-- MOBILE FIX (VERY IMPORTANT) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Golf Swing Fix Finder</h1>
    <p class="subtitle">Diagnose your swing. Fix your game.</p>

    <select id="issue">
      <option value="">Select your issue</option>
      <option value="Slice">Slice</option>
      <option value="Hook">Hook</option>
      <option value="Push">Push</option>
      <option value="Pull">Pull</option>
      <option value="Chunk">Chunk</option>
      <option value="Top">Top</option>
      <option value="Loss of Distance">Loss of Distance</option>
      <option value="Too Much Spin">Too Much Spin</option>
    </select>

    <button onclick="getFix()">Find Fix</button>

    <div id="result"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
